            // ====== ГЕНЕРАЦИЯ ЛУЧШИХ КОМБИНАЦИЙ ======
            function generateBestCombinations(flavors, brand, maxPerBrand) {
                const recipes = [];
                const used = new Set();

                // Базовые вкусы (первые 10-12 самых логичных)
                const baseFlavors = flavors.slice(0, Math.min(12, flavors.length));

                // 1. Двойные миксы (все комбинации базовых вкусов)
                for (let i = 0; i < baseFlavors.length; i++) {
                    for (let j = i + 1; j < baseFlavors.length; j++) {
                        const key = [baseFlavors[i], baseFlavors[j]].sort().join('|');
                        if (used.has(key)) continue;
                        used.add(key);
                        
                        const p1 = Math.floor(Math.random() * 30) + 35;
                        const p2 = 100 - p1;
                        
                        const tags = [];
                        if (['Мята', 'Ледяная мята'].some(m => [baseFlavors[i], baseFlavors[j]].includes(m))) tags.push('свежий');
                        if (['Банан', 'Манго', 'Ананас', 'Персик', 'Яблоко', 'Груша', 'Арбуз', 'Дыня'].some(f => [baseFlavors[i], baseFlavors[j]].includes(f))) tags.push('фруктовый');
                        if (['Клубника', 'Малина', 'Черника', 'Вишня', 'Ежевика', 'Голубика', 'Клюква'].some(f => [baseFlavors[i], baseFlavors[j]].includes(f))) tags.push('ягодный');
                        if (['Шоколад', 'Карамель', 'Ваниль', 'Сливки', 'Йогурт'].some(f => [baseFlavors[i], baseFlavors[j]].includes(f))) tags.push('десертный');
                        
                        recipes.push({
                            name: `${baseFlavors[i]} + ${baseFlavors[j]}`,
                            brand: brand,
                            ingredients: [baseFlavors[i], baseFlavors[j]],
                            ratio: `${p1}% + ${p2}%`,
                            tags: tags.length > 0 ? tags : ['микс'],
                            description: `Двойной микс от ${brand}.`
                        });
                    }
                }

                // 2. Тройные миксы (выборочно, лучшие сочетания)
                const tripleCombos = [];
                for (let i = 0; i < baseFlavors.length; i++) {
                    for (let j = i + 1; j < baseFlavors.length; j++) {
                        for (let k = j + 1; k < baseFlavors.length; k++) {
                            // Пропускаем странные сочетания
                            const hasMint = [baseFlavors[i], baseFlavors[j], baseFlavors[k]].some(f => f.includes('Мята') || f.includes('Лед'));
                            const hasSweet = [baseFlavors[i], baseFlavors[j], baseFlavors[k]].some(f => ['Мед', 'Сахар', 'Карамель', 'Шоколад', 'Ваниль', 'Сливки'].includes(f));
                            const hasFruit = [baseFlavors[i], baseFlavors[j], baseFlavors[k]].some(f => ['Ананас', 'Манго', 'Персик', 'Апельсин', 'Банан', 'Яблоко', 'Груша', 'Арбуз', 'Дыня'].includes(f));
                            
                            if (hasMint && hasSweet && !hasFruit) continue;
                            if (hasMint && hasFruit && !hasSweet) continue;
                            
                            const key = [baseFlavors[i], baseFlavors[j], baseFlavors[k]].sort().join('|');
                            if (used.has(key)) continue;
                            used.add(key);
                            
                            const p1 = Math.floor(Math.random() * 25) + 20;
                            const p2 = Math.floor(Math.random() * 25) + 20;
                            const p3 = 100 - p1 - p2;
                            
                            const tags = [];
                            if (['Мята', 'Ледяная мята'].some(m => [baseFlavors[i], baseFlavors[j], baseFlavors[k]].includes(m))) tags.push('свежий');
                            if (['Банан', 'Манго', 'Ананас', 'Персик', 'Яблоко', 'Груша', 'Арбуз', 'Дыня'].some(f => [baseFlavors[i], baseFlavors[j], baseFlavors[k]].includes(f))) tags.push('фруктовый');
                            if (['Клубника', 'Малина', 'Черника', 'Вишня', 'Ежевика', 'Голубика', 'Клюква'].some(f => [baseFlavors[i], baseFlavors[j], baseFlavors[k]].includes(f))) tags.push('ягодный');
                            if (['Шоколад', 'Карамель', 'Ваниль', 'Сливки', 'Йогурт'].some(f => [baseFlavors[i], baseFlavors[j], baseFlavors[k]].includes(f))) tags.push('десертный');
                            
                            tripleCombos.push({
                                name: `${baseFlavors[i]} + ${baseFlavors[j]} + ${baseFlavors[k]}`,
                                brand: brand,
                                ingredients: [baseFlavors[i], baseFlavors[j], baseFlavors[k]],
                                ratio: `${p1}% + ${p2}% + ${p3}%`,
                                tags: tags.length > 0 ? tags : ['микс'],
                                description: `Тройной микс от ${brand}.`
                            });
                        }
                    }
                }

                // Выбираем лучшие тройные миксы (не больше 30 на бренд)
                const shuffled = tripleCombos.sort(() => Math.random() - 0.5);
                const selectedTriples = shuffled.slice(0, Math.min(30, shuffled.length));
                
                recipes.push(...selectedTriples);
                
                return recipes;
            }

            // ====== СБОР ВСЕХ РЕЦЕПТОВ ======
            log('🔄 Генерируем лучшие комбинации...', 'info');
            
            let allRecipes = [...realRecipes];
            
            Object.keys(brandFlavors).forEach(brand => {
                const flavors = brandFlavors[brand];
                // Для больших брендов генерируем больше, для маленьких — меньше
                let maxPerBrand = 200;
                if (brand === 'Северный') maxPerBrand = 80;
                if (brand === 'Сарма') maxPerBrand = 120;
                
                const generated = generateBestCombinations(flavors, brand, maxPerBrand);
                allRecipes = allRecipes.concat(generated);
                log(`📊 ${brand}: ${flavors.length} вкусов → ${generated.length} комбинаций`, 'real');
            });

            // Удаляем дубликаты
            const uniqueRecipes = [];
            const seen = new Set();
            allRecipes.forEach(recipe => {
                const key = `${recipe.name}|${recipe.brand}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueRecipes.push(recipe);
                }
            });

            // Обрезаем до ~2000
            let finalRecipes = uniqueRecipes;
            if (finalRecipes.length > 2000) {
                // Перемешиваем и обрезаем
                finalRecipes = finalRecipes.sort(() => Math.random() - 0.5).slice(0, 2000);
                log(`📊 Обрезано до 2000 рецептов`, 'warning');
            }

            log(`📊 Итоговое количество рецептов: ${finalRecipes.length}`, 'success');

            let count = 0;
            let errors = 0;

            for (const recipe of finalRecipes) {
                try {
                    const newRef = database.ref('recipes').push();
                    await newRef.set({
                        name: recipe.name,
                        brand: recipe.brand,
                        ingredients: recipe.ingredients,
                        ratio: recipe.ratio,
                        tags: recipe.tags || [],
                        description: recipe.description || 'Проверенный рецепт',
                        views: 0,
                        createdAt: Date.now()
                    });
                    count++;
                    if (count % 50 === 0) {
                        log(`✅ [${count}/${finalRecipes.length}] Импортировано...`, 'success');
                        updateStatus(`⏳ Импорт: ${count}/${finalRecipes.length}`);
                    }
                } catch (error) {
                    errors++;
                    log(`❌ Ошибка: ${recipe.name} - ${error.message}`, 'error');
                }
            }

            log(`\n🎉 ГОТОВО! Импортировано ${count} рецептов`, 'success');
            log(`📊 ${errors > 0 ? `⚠️ ${errors} ошибок` : '✅ Все рецепты успешно загружены!'}`, errors > 0 ? 'warning' : 'success');
            updateStatus(`✅ Импорт завершён! ${count} рецептов`);
            button.disabled = false;
            button.textContent = '🔄 Импортировать ещё';
        }
    </script>
</body>
</html>
