                        if (['Чай', 'Кофе'].some(f => [flavors[i], flavors[j]].includes(f))) tags.push('напиток');
                        
                        recipes.push({
                            name: name,
                            brand: brand,
                            ingredients: [flavors[i], flavors[j]],
                            ratio: `${p1}% + ${p2}%`,
                            tags: tags,
                            description: `Двойной микс от ${brand}. ${tags.join(', ')}.`
                        });
                    }
                }

                // 2. Тройные миксы (выборочно, чтобы не перегружать)
                for (let i = 0; i < flavors.length; i++) {
                    for (let j = i + 1; j < flavors.length; j++) {
                        for (let k = j + 1; k < flavors.length; k++) {
                            // Пропускаем слишком странные сочетания

                            const key = [flavors[i], flavors[j], flavors[k]].sort().join('|');
                            if (used.has(key)) continue;
                            used.add(key);

                            const p2 = Math.floor(Math.random() * 30) + 20;
                            const p3 = 100 - p1 - p2;
                            
                            const name = `${flavors[i]} + ${flavors[j]} + ${flavors[k]}`;
                            const tags = [];
                            if (['Мята', 'Ледяная мята'].some(m => [flavors[i], flavors[j], flavors[k]].includes(m))) tags.push('свежий');
                            if (['Банан', 'Манго', 'Ананас', 'Персик', 'Яблоко', 'Груша', 'Арбуз', 'Дыня'].some(f => [flavors[i], flavors[j], flavors[k]].includes(f))) tags.push('фруктовый');
                            if (['Клубника', 'Малина', 'Черника', 'Вишня', 'Ежевика', 'Голубика', 'Клюква'].some(f => [flavors[i], flavors[j], flavors[k]].includes(f))) tags.push('ягодный');
                            if (['Шоколад', 'Карамель', 'Ваниль', 'Сливки', 'Йогурт', 'Сливочное масло'].some(f => [flavors[i], flavors[j], flavors[k]].includes(f))) tags.push('десертный');
                            if (['Имбирь', 'Корица', 'Бергамот'].some(f => [flavors[i], flavors[j], flavors[k]].includes(f))) tags.push('пряный');

                { name: "Чай с бергамотом", brand: "Сарма", ingredients: ["Чай", "Бергамот"], ratio: "70% + 30%", tags: ["классика", "чайный"], description: "Аристократичный вкус." },

                allRecipes = allRecipes.concat(generated);

            // Удаляем дубликаты
            const uniqueRecipes = [];
            const seen = new Set();
            allRecipes.forEach(recipe => {
                const key = `${recipe.name}|${recipe.brand}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueRecipes.push(recipe);
                }
            });

            log(`📊 Всего уникальных рецептов: ${uniqueRecipes.length}`, 'success');

            let count = 0;
            let errors = 0;

            for (const recipe of uniqueRecipes) {
                try {
                    const newRef = database.ref('recipes').push();
                    await newRef.set({
                        name: recipe.name,
                        brand: recipe.brand,
                        ingredients: recipe.ingredients,
                        ratio: recipe.ratio,
                        tags: recipe.tags || [],
                        description: recipe.description || 'Проверенный рецепт',
                        views: 0,
                        createdAt: Date.now()
                    });
                    count++;
                    if (count % 20 === 0) {
                        log(`✅ [${count}/${uniqueRecipes.length}] Импортировано...`, 'success');
                        updateStatus(`⏳ Импорт: ${count}/${uniqueRecipes.length}`);
                    }
                } catch (error) {
                    errors++;
                    log(`❌ Ошибка: ${recipe.name} - ${error.message}`, 'error');
                }
            }

            log(`\n🎉 ГОТОВО! Импортировано ${count} рецептов из ${uniqueRecipes.length}`, 'success');
            log(`📊 ${errors > 0 ? `⚠️ ${errors} ошибок` : '✅ Все рецепты успешно загружены!'}`, errors > 0 ? 'warning' : 'success');
            updateStatus(`✅ Импорт завершён! ${count} рецептов`);
            button.disabled = false;
            button.textContent = '🔄 Импортировать ещё';
        }
    </script>
</body>
</html>
